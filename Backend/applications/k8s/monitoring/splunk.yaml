# ============================================================
#  k8s/monitoring/splunk.yaml
#  Deploys:
#  - Splunk Enterprise (central log aggregation)
#  - Splunk Universal Forwarder as DaemonSet (runs on every node)
#    to collect logs from all pods including budget-tracker
# ============================================================

---
# ── Splunk admin credentials ──────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: splunk-credentials
  namespace: monitoring
type: Opaque
stringData:
  password: changeme   # Override with: kubectl create secret generic splunk-credentials --from-literal=password='YourPassword' -n monitoring --dry-run=client -o yaml | kubectl apply -f -

---
# ── Persistent storage for Splunk indexes ────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: splunk-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 50Gi             # Splunk needs significant storage for indexes

---
# ── Splunk Enterprise Deployment ─────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk
  namespace: monitoring
  labels:
    app: splunk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splunk
  template:
    metadata:
      labels:
        app: splunk
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: splunk
          image: splunk/splunk:9.1.2
          ports:
            - containerPort: 8000    # Splunk Web UI
              name: web
            - containerPort: 8088    # HTTP Event Collector (HEC)
              name: hec
            - containerPort: 9997    # Universal Forwarder receiver
              name: forwarder
            - containerPort: 8089    # Splunk management port
              name: mgmt
          env:
            - name: SPLUNK_START_ARGS
              value: "--accept-license"
            - name: SPLUNK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: splunk-credentials
                  key: password
            - name: SPLUNK_HEC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-credentials
                  key: password
            - name: SPLUNK_APPS_URL
              value: ""
            # Pre-configure indexes for budget tracker
            - name: SPLUNK_DEFAULTS_URL
              value: ""
          volumeMounts:
            - name: storage
              mountPath: /opt/splunk/var
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          readinessProbe:
            httpGet:
              path: /services/server/info
              port: 8089
              scheme: HTTPS
            initialDelaySeconds: 60   # Splunk takes time to start
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /services/server/info
              port: 8089
              scheme: HTTPS
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: splunk-pvc

---
# ── Splunk Services ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: splunk-service
  namespace: monitoring
  labels:
    app: splunk
spec:
  selector:
    app: splunk
  ports:
    - name: web
      port: 8000
      targetPort: 8000
    - name: hec
      port: 8088
      targetPort: 8088
    - name: forwarder
      port: 9997
      targetPort: 9997
    - name: mgmt
      port: 8089
      targetPort: 8089
  type: ClusterIP

---
# ── Splunk Universal Forwarder — runs on EVERY node ──────────
# DaemonSet ensures logs from all pods are collected
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: splunk-forwarder
  namespace: monitoring
  labels:
    app: splunk-forwarder
spec:
  selector:
    matchLabels:
      app: splunk-forwarder
  template:
    metadata:
      labels:
        app: splunk-forwarder
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      tolerations:
        # Run on all nodes including control plane
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: splunk-forwarder
          image: splunk/universalforwarder:9.1.2
          env:
            - name: SPLUNK_START_ARGS
              value: "--accept-license"
            - name: SPLUNK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: splunk-credentials
                  key: password
            # Forward to Splunk Enterprise service
            - name: SPLUNK_FORWARD_SERVER
              value: "splunk-service:9997"
          volumeMounts:
            # Mount host log paths to collect all container logs
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: splunk-inputs
              mountPath: /opt/splunkforwarder/etc/system/local
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: splunk-inputs
          configMap:
            name: splunk-forwarder-inputs

---
# ── Forwarder inputs — what log paths to collect ─────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: splunk-forwarder-inputs
  namespace: monitoring
data:
  inputs.conf: |
    # Collect all Kubernetes pod logs
    [monitor:///var/log/containers/*.log]
    index = kubernetes
    sourcetype = kube:container
    disabled = false

    # Specifically collect budget-tracker namespace logs
    [monitor:///var/log/containers/*budget-tracker*.log]
    index = budget_tracker
    sourcetype = kube:budget-tracker
    disabled = false

    # Collect Istio proxy logs
    [monitor:///var/log/containers/*istio-proxy*.log]
    index = istio
    sourcetype = kube:istio-proxy
    disabled = false

  outputs.conf: |
    [tcpout]
    defaultGroup = splunk-enterprise

    [tcpout:splunk-enterprise]
    server = splunk-service:9997

  props.conf: |
    # Parse JSON logs from Node.js backend
    [kube:budget-tracker]
    KV_MODE = json
    TIME_PREFIX = "timestamp":"
    TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N