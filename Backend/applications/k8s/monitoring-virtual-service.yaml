apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: grafana-vs
  namespace: monitoring
spec:
  hosts:
    - "grafana.PhongKieuTele.id.vn"
  gateways:
    - budget-tracker/budget-gateway
  http:
    - route:
        - destination:
            host: grafana-service.monitoring.svc.cluster.local
            port:
              number: 3000

