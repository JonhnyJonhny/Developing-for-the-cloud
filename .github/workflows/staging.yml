# ============================================================
#  .github/workflows/staging.yml
#
#  Triggers : push to staging branch
#  Pipeline : build → push Docker Hub → deploy to staging namespace
# ============================================================

name: Build and Deploy — Staging

on:
  push:
    branches:
      - staging

env:
  AWS_REGION:        ap-southeast-1
  EKS_CLUSTER:       budget-tracker-cluster
  K8S_NAMESPACE:     budget-tracker-staging
  IMAGE_FRONTEND:    ${{ secrets.DOCKERHUB_USERNAME }}/budget-frontend
  IMAGE_BACKEND:     ${{ secrets.DOCKERHUB_USERNAME }}/budget-backend

jobs:

  build-staging:
    name: Build and push staging images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate staging image tag
        id: tag
        run: |
          TAG="staging-$(echo ${{ github.sha }} | cut -c1-8)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Staging image tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_FRONTEND }}:buildcache,mode=max

      - name: Build and push backend (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_BACKEND }}:buildcache,mode=max

  deploy-staging:
    name: Deploy to staging namespace
    runs-on: ubuntu-latest
    needs: build-staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name   ${{ env.EKS_CLUSTER }}

      - name: Create staging namespace with Istio injection
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl label namespace ${{ env.K8S_NAMESPACE }} \
            istio-injection=enabled --overwrite

      - name: Create staging RDS secret
        run: |
          kubectl create secret generic rds-credentials \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --from-literal=RDS_HOST="${{ secrets.STAGING_RDS_HOST }}"         \
            --from-literal=RDS_PORT="${{ secrets.RDS_PORT }}"                 \
            --from-literal=RDS_USER="${{ secrets.RDS_USER }}"                 \
            --from-literal=RDS_PASSWORD="${{ secrets.DB_PASSWORD }}"         \
            --from-literal=RDS_DATABASE="budget_tracker_staging"              \
            --from-literal=SQS_QUEUE_URL="${{ secrets.STAGING_SQS_QUEUE_URL }}"\
            --from-literal=AWS_REGION="${{ env.AWS_REGION }}"                 \
            --save-config \
            --dry-run=client -o yaml \
            | kubectl apply -f -

      - name: Deploy to staging
        run: |
          TAG=${{ needs.build-staging.outputs.image_tag }}
          NS=${{ env.K8S_NAMESPACE }}

          # Swap image tags and namespace, then apply
          sed -e "s|budget-frontend:latest|budget-frontend:$TAG|g" \
              -e "s|namespace: budget-tracker$|namespace: $NS|g"   \
              k8s/frontend-deployment.yaml | kubectl apply -f -

          sed -e "s|budget-backend:latest|budget-backend:$TAG|g" \
              -e "s|namespace: budget-tracker$|namespace: $NS|g" \
              k8s/backend-deployment.yaml | kubectl apply -f -

          kubectl apply -f k8s/frontend-service.yaml -n $NS
          kubectl apply -f k8s/backend-service.yaml  -n $NS

      - name: Wait for staging rollout
        run: |
          kubectl rollout status deployment/backend  -n ${{ env.K8S_NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/frontend -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Staging summary
        run: |
          echo "### Staging deployment complete"                        >> $GITHUB_STEP_SUMMARY
          echo "| Field     | Value |"                                  >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                                               >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${{ needs.build-staging.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ env.K8S_NAMESPACE }}\` |"          >> $GITHUB_STEP_SUMMARY
          echo ""                                                       >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}                 >> $GITHUB_STEP_SUMMARY