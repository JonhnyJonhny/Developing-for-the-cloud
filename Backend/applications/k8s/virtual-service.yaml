# ============================================================
#  k8s/virtual-service.yaml
#  Domain: PhongKieuTele.id.vn
#  Routes traffic based on hostname to the correct service
# ============================================================

# ── Main app — PhongKieuTele.id.vn ───────────────────────────
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: budget-app-vs
  namespace: budget-tracker
spec:
  hosts:
    - "PhongKieuTele.id.vn"
    - "www.PhongKieuTele.id.vn"
  gateways:
    - budget-gateway
  http:
    # All routes go to frontend
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: frontend-service
            port:
              number: 80

---
# ── API — api.PhongKieuTele.id.vn ────────────────────────────
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: budget-api-vs
  namespace: budget-tracker
spec:
  hosts:
    - "api.PhongKieuTele.id.vn"
  gateways:
    - budget-gateway
  http:
    - route:
        - destination:
            host: backend-service
            port:
              number: 3000
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: "5xx,reset,connect-failure"

---
# ── Grafana — grafana.PhongKieuTele.id.vn ────────────────────
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: grafana-vs
  namespace: monitoring
spec:
  hosts:
    - "grafana.PhongKieuTele.id.vn"
  gateways:
    - budget-tracker/budget-gateway
  http:
    - route:
        - destination:
            host: grafana-service.monitoring.svc.cluster.local
            port:
              number: 3000

---
# ── Prometheus — prometheus.PhongKieuTele.id.vn ──────────────
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: prometheus-vs
  namespace: monitoring
spec:
  hosts:
    - "prometheus.PhongKieuTele.id.vn"
  gateways:
    - budget-tracker/budget-gateway
  http:
    - route:
        - destination:
            host: prometheus-service.monitoring.svc.cluster.local
            port:
              number: 9090

---
# ── Splunk — splunk.PhongKieuTele.id.vn ──────────────────────
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: splunk-vs
  namespace: monitoring
spec:
  hosts:
    - "splunk.PhongKieuTele.id.vn"
  gateways:
    - budget-tracker/budget-gateway
  http:
    - route:
        - destination:
            host: splunk-service.monitoring.svc.cluster.local
            port:
              number: 8000