# application/.github/workflows/deploy.yml
name: Build and Deploy to EKS

on:
  push:
    branches:
      - main # Triggers the workflow on push to the main branch
  workflow_dispatch: 

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: budget-app-cluster
  K8S_NAMESPACE: budget-tracker

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker images
      id: build-image
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        BACKEND_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/budget-backend:$IMAGE_TAG
        FRONTEND_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/budget-frontend:$IMAGE_TAG

        docker build -f Dockerfile.backend  -t $BACKEND_IMAGE  .
        docker push $BACKEND_IMAGE

        docker build -f Dockerfile.frontend -t $FRONTEND_IMAGE .
        docker push $FRONTEND_IMAGE

        echo "backend_image=$BACKEND_IMAGE"   >> $GITHUB_OUTPUT
        echo "frontend_image=$FRONTEND_IMAGE" >> $GITHUB_OUTPUT

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update Kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Deploy to EKS
      env:
        BACKEND_IMAGE:  ${{ steps.build-image.outputs.backend_image }}
        FRONTEND_IMAGE: ${{ steps.build-image.outputs.frontend_image }}
        NS: ${{ env.K8S_NAMESPACE }}
        RDS_HOST: ${{ secrets.RDS_HOST }}
        SQS_QUEUE_URL: ${{ secrets.SQS_QUEUE_URL }}
      run: |
        set -e  # stop on first error and show which command failed
        # Inject real RDS host into deployment manifest
        sed -i "s|your-rds-endpoint.amazonaws.com|$RDS_HOST|g" \
          Backend/applications/k8s/deployment.yaml

        # Ensure namespace exists with Istio injection enabled
        kubectl create namespace $NS --dry-run=client -o yaml | kubectl apply -f -
        kubectl label namespace $NS istio-injection=enabled --overwrite

        # Create/update secrets
        kubectl create secret generic db-credentials \
          --from-literal=password=${{ secrets.DB_PASSWORD }} \
          --namespace=$NS --dry-run=client -o yaml | kubectl apply -f -

        kubectl create secret generic app-config \
          --from-literal=sqs_queue_url=$SQS_QUEUE_URL \
          --namespace=$NS --dry-run=client -o yaml | kubectl apply -f -

        # Inject real image tag into backend manifest and apply
        sed -i "s|BACKEND_IMAGE_PLACEHOLDER|$BACKEND_IMAGE|g" \
          Backend/applications/k8s/deployment.yaml
        kubectl apply -f Backend/applications/k8s/deployment.yaml -n $NS

        # Deploy backend service
        kubectl apply -f Backend/applications/k8s/backend-service.yaml -n $NS

        # Deploy frontend
        sed -e "s|budget-frontend:latest|$FRONTEND_IMAGE|g" \
          Backend/applications/k8s/frontend-deployment.yaml | kubectl apply -n $NS -f -
        kubectl apply -f Backend/applications/k8s/frontend-service.yaml -n $NS

        # Apply Istio Gateway and VirtualService routing
        kubectl apply -f Backend/applications/k8s/gateway.yaml
        kubectl apply -f Backend/applications/k8s/virtual-service.yaml

        # Apply monitoring stack — non-blocking, namespace must exist first
        kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f Backend/applications/k8s/monitoring/namespace.yaml || echo "Warning: namespace.yaml had issues, continuing"
        kubectl apply -f Backend/applications/k8s/monitoring/prometheus.yaml -n monitoring || echo "Warning: prometheus.yaml had issues, continuing"
        kubectl apply -f Backend/applications/k8s/monitoring/grafana.yaml -n monitoring || echo "Warning: grafana.yaml had issues, continuing"
        kubectl apply -f Backend/applications/k8s/monitoring/splunk.yaml -n monitoring || echo "Warning: splunk.yaml had issues, continuing"