# application/.github/workflows/deploy.yml
name: Build and Deploy to EKS

on:
  push:
    branches:
      - main # Triggers the workflow on push to the main branch

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: budget-app-cluster
  # Set your Docker Hub repository details here
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/my-modern-app 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      id: build-image
      env:
        # Uses the unique GitHub commit ID as the image tag
        IMAGE_TAG: ${{ github.sha }} 
      run: |
        docker build -t ${{ env.DOCKER_IMAGE_NAME }}:$IMAGE_TAG .
        docker push ${{ env.DOCKER_IMAGE_NAME }}:$IMAGE_TAG
        echo "image=${{ env.DOCKER_IMAGE_NAME }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update Kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Deploy to EKS
      env:
        IMAGE_URL: ${{ steps.build-image.outputs.image }}
      run: |
        # Swap the placeholder in the manifest with the newly built Docker image
        sed -i "s|IMAGE_TAG_PLACEHOLDER|$IMAGE_URL|g" k8s/deployment.yaml
        
        # Apply the updated configuration to your cluster
        kubectl apply -f k8s/deployment.yaml