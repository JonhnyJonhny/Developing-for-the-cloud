# application/k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: budget-tracker
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        sidecar.istio.io/inject: "true" 
    spec:
      containers:
      - name: backend-container
        # GitHub Actions will replace this placeholder with the real image tag
        image: BACKEND_IMAGE_PLACEHOLDER
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: "your-rds-endpoint.amazonaws.com" # Replace with: terraform output rds_endpoint
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "appdb"
        - name: DB_USER
          value: "admin"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: AWS_REGION
          value: "us-east-1"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: budget-tracker
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP