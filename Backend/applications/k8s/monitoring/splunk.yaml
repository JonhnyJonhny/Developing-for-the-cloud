---
apiVersion: v1
kind: Secret
metadata:
  name: splunk-credentials
  namespace: monitoring
type: Opaque
stringData:
  password: admin123!

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk
  namespace: monitoring
  labels:
    app: splunk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splunk
  template:
    metadata:
      labels:
        app: splunk
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: splunk
          image: splunk/splunk:9.2.1
          ports:
            - containerPort: 8000
              name: web
            - containerPort: 8088
              name: hec
            - containerPort: 9997
              name: forwarder
            - containerPort: 8089
              name: mgmt
          env:
            - name: SPLUNK_START_ARGS
              value: "--accept-license"
            - name: SPLUNK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: splunk-credentials
                  key: password
          volumeMounts:
            - name: storage
              mountPath: /opt/splunk/var
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /services/server/info
              port: 8089
              scheme: HTTPS
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /services/server/info
              port: 8089
              scheme: HTTPS
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: storage
          emptyDir: {}

---

apiVersion: v1
kind: Service
metadata:
  name: splunk-service
  namespace: monitoring
  labels:
    app: splunk
spec:
  selector:
    app: splunk
  ports:
    - name: web
      port: 8000
      targetPort: 8000
    - name: hec
      port: 8088
      targetPort: 8088
    - name: forwarder
      port: 9997
      targetPort: 9997
    - name: mgmt
      port: 8089
      targetPort: 8089
  type: ClusterIP

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: splunk-forwarder
  namespace: monitoring
  labels:
    app: splunk-forwarder
spec:
  selector:
    matchLabels:
      app: splunk-forwarder
  template:
    metadata:
      labels:
        app: splunk-forwarder
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: splunk-forwarder
          image: splunk/universalforwarder:latest
          env:
            - name: SPLUNK_START_ARGS
              value: "--accept-license"
            - name: SPLUNK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: splunk-credentials
                  key: password
            - name: SPLUNK_FORWARD_SERVER
              value: "splunk-service:9997"
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: splunk-inputs
              mountPath: /opt/splunkforwarder/etc/system/local
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "150m"
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: splunk-inputs
          configMap:
            name: splunk-forwarder-inputs

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: splunk-forwarder-inputs
  namespace: monitoring
data:
  inputs.conf: |
    [monitor:///var/log/containers/*.log]
    index = kubernetes
    sourcetype = kube:container
    disabled = false

    [monitor:///var/log/containers/*budget-tracker*.log]
    index = budget_tracker
    sourcetype = kube:budget-tracker
    disabled = false

    [monitor:///var/log/containers/*istio-proxy*.log]
    index = istio
    sourcetype = kube:istio-proxy
    disabled = false

  outputs.conf: |
    [tcpout]
    defaultGroup = splunk-enterprise

    [tcpout:splunk-enterprise]
    server = splunk-service:9997

  props.conf: |
    [kube:budget-tracker]
    KV_MODE = json
    TIME_PREFIX = "timestamp":"
    TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3N