<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Report</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 32px 24px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }

    p.sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }

    button:hover { background: #e8e8e8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      font-size: 13px;
      color: #555;
      margin-bottom: 12px;
      min-height: 18px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-size: 13px;
    }

    th {
      background: #222;
      color: #fff;
      padding: 9px 12px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid #e5e5e5;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9f9f9; }

    .amount-pos { color: #1a9e6e; font-weight: 600; }
    .amount-neg { color: #c0392b; font-weight: 600; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 6px;
      padding: 24px;
      width: 360px;
      max-width: 95vw;
    }

    .modal h2 { font-size: 16px; margin-bottom: 16px; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .field label { font-size: 12px; color: #555; }

    .field input, .field select {
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
    }

    .field input:focus, .field select:focus { border-color: #555; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    .btn-primary {
      background: #222;
      color: #fff;
      border-color: #222;
    }

    .btn-primary:hover { background: #444; }

    #form-error {
      font-size: 12px;
      color: #c0392b;
      min-height: 16px;
      margin-top: -6px;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

  <h1>Budget Report</h1>
  <p class="sub">Live data from the backend database.</p>

  <div class="toolbar">
    <button id="btn-load" onclick="loadReport()">Load report</button>
    <button id="btn-download" onclick="downloadCSV()" disabled>Download CSV</button>
    <button onclick="openModal()">+ Add transaction</button>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Add transaction</h2>
      <div class="field">
        <label>Description</label>
        <input type="text" id="f-name" placeholder="e.g. Grocery shopping">
      </div>
      <div class="field">
        <label>Category</label>
        <select id="f-category">
          <option>Food</option>
          <option>Housing</option>
          <option>Transport</option>
          <option>Shopping</option>
          <option>Utilities</option>
          <option>Entertainment</option>
          <option>Health</option>
          <option>Income</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Amount (£) — negative for expenses</label>
        <input type="number" id="f-amount" placeholder="e.g. -42.50" step="0.01">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="f-type">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>
      <div id="form-error"></div>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="addTransaction()">Save</button>
      </div>
    </div>
  </div>

  <div id="status"></div>

  <div class="table-wrap">
    <table id="report-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Type</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="report-body">
        <tr><td colspan="6" style="color:#999;text-align:center;padding:24px">Click "Load report" to fetch data.</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let csvBlob = null;

    async function loadReport() {
      const btn    = document.getElementById("btn-load");
      const status = document.getElementById("status");
      const tbody  = document.getElementById("report-body");

      btn.disabled = true;
      status.textContent = "Fetching…";
      tbody.innerHTML = "";

      try {
        const res = await fetch("/api/reports/download");
        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const text = await res.text();
        csvBlob = new Blob([text], { type: "text/csv" });

        const lines = text.trim().split("\n");
        const headers = lines[0].split(",");
        const rows = lines.slice(1);

        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px;color:#999">No transactions found.</td></tr>`;
          status.textContent = "No data.";
          document.getElementById("btn-download").disabled = true;
          return;
        }

        rows.forEach(line => {
          const cols = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
          const clean = cols.map(c => c.replace(/^"|"$/g, "").replace(/""/g, '"'));

          const id       = clean[0] || "";
          const name     = clean[1] || "";
          const category = clean[2] || "";
          const amount   = parseFloat(clean[3]) || 0;
          const type     = clean[4] || "";
          const created  = clean[6] ? clean[6].replace("T", " ").slice(0, 19) : "";

          const amtClass = amount >= 0 ? "amount-pos" : "amount-neg";
          const amtText  = (amount >= 0 ? "+" : "") + "£" + Math.abs(amount).toFixed(2);

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${id}</td>
            <td>${name}</td>
            <td>${category}</td>
            <td class="${amtClass}">${amtText}</td>
            <td>${type}</td>
            <td>${created}</td>
          `;
          tbody.appendChild(tr);
        });

        status.textContent = `${rows.length} transaction(s) loaded.`;
        document.getElementById("btn-download").disabled = false;

      } catch (err) {
        status.textContent = "Error: " + err.message;
        tbody.innerHTML = `<tr><td colspan="6" style="color:#c0392b;text-align:center;padding:24px">${err.message}</td></tr>`;
      } finally {
        btn.disabled = false;
      }
    }

    function openModal() {
      document.getElementById("form-error").textContent = "";
      document.getElementById("f-name").value   = "";
      document.getElementById("f-amount").value = "";
      document.getElementById("f-category").selectedIndex = 0;
      document.getElementById("f-type").selectedIndex     = 0;
      document.getElementById("modal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("open");
    }

    async function addTransaction() {
      const errorEl = document.getElementById("form-error");
      const name     = document.getElementById("f-name").value.trim();
      const category = document.getElementById("f-category").value;
      const amount   = parseFloat(document.getElementById("f-amount").value);
      const type     = document.getElementById("f-type").value;

      if (!name || isNaN(amount)) {
        errorEl.textContent = "Please fill in all fields.";
        return;
      }

      const saveBtn = document.querySelector(".btn-primary");
      saveBtn.disabled = true;
      errorEl.textContent = "";

      try {
        const res = await fetch("/api/transactions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, category, amount, type })
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || `Server error ${res.status}`);
        }

        closeModal();
        document.getElementById("status").textContent = `"${name}" added. Reload the report to see it.`;
      } catch (err) {
        errorEl.textContent = err.message;
      } finally {
        saveBtn.disabled = false;
      }
    }

    function downloadCSV() {
      if (!csvBlob) return;
      const url = URL.createObjectURL(csvBlob);
      const a   = document.createElement("a");
      a.href     = url;
      a.download = `budget-report-${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
